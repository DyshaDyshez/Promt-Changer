<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1a1f2e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#eef2ff" media="(prefers-color-scheme: light)">
    <title>Промт-мастер | 3D параллакс + теги</title>
    <style>
        /* ===== ПЕРЕМЕННЫЕ И ТЁМНАЯ ТЕМА ПО УМОЛЧАНИЮ ===== */
        :root {
            --bg-gradient-start: #1a1f2e;
            --bg-gradient-end: #0b0d17;
            --text-primary: #eef2ff;
            --text-secondary: #9aa4c8;
            --panel-bg: rgba(20, 25, 40, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(12, 16, 28, 0.7);
            --input-border: #2f3750;
            --accent: #4f6af5;
            --accent-glow: #2e3aa3;
            --chip-bg: rgba(79, 106, 245, 0.15);
            --chip-border: #3c4870;
            --chip-hover: #4f6af5;
            --result-bg: rgba(8, 12, 22, 0.6);
        }

        /* Светлая тема (если система предпочитает светлую) */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-gradient-start: #e0e5f0;
                --bg-gradient-end: #c0c8da;
                --text-primary: #1a1f2e;
                --text-secondary: #3f4a6b;
                --panel-bg: rgba(255, 255, 255, 0.8);
                --panel-border: rgba(0, 0, 0, 0.1);
                --input-bg: rgba(240, 245, 255, 0.9);
                --input-border: #b0b8d0;
                --accent: #4f6af5;
                --accent-glow: #6d85f9;
                --chip-bg: rgba(79, 106, 245, 0.1);
                --chip-border: #b0b8d0;
                --chip-hover: #4f6af5;
                --result-bg: rgba(230, 235, 250, 0.7);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background 0.3s, color 0.3s;
        }

        .shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            filter: blur(40px);
            will-change: transform;
        }

        .shape1 { width: 300px; height: 300px; background: rgba(0, 180, 255, 0.15); top: 5%; left: -5%; }
        .shape2 { width: 500px; height: 500px; background: rgba(180, 90, 255, 0.1); bottom: -10%; right: -5%; border-radius: 60% 40% 50% 50%; }
        .shape3 { width: 250px; height: 250px; background: rgba(255, 120, 150, 0.12); top: 40%; right: 15%; border-radius: 30% 70% 70% 30%; filter: blur(50px); }
        .shape4 { width: 400px; height: 400px; background: rgba(100, 255, 150, 0.08); bottom: 20%; left: 10%; border-radius: 40% 60% 30% 70%; }
        .shape5 { width: 200px; height: 200px; background: rgba(255, 200, 100, 0.1); top: 15%; right: 25%; border-radius: 50% 20% 50% 20%; filter: blur(30px); }

        .main-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255,255,255,0.06);
            transition: background 0.3s, border-color 0.3s;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #b0c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subhead {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
        }

        textarea, select, input[type=range] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 1rem 1.3rem;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            transition: border 0.2s, box-shadow 0.2s, transform 0.2s, background 0.3s;
            backdrop-filter: blur(4px);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        textarea:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 106, 245, 0.2);
        }

        .select-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .select-item {
            flex: 1 1 200px;
        }

        .extra-settings {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid var(--input-border);
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .setting-item {
            flex: 1 1 200px;
            min-width: 160px;
        }

        .setting-item label {
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }

        .range-value {
            display: inline-block;
            margin-left: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .aspect-ratio-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .aspect-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            flex: 0 0 auto;
        }

        /* Пропорциональная ширина кнопок */
        .aspect-btn[data-ratio="16:9"] { min-width: 80px; }
        .aspect-btn[data-ratio="1:1"] { min-width: 60px; }
        .aspect-btn[data-ratio="9:16"] { min-width: 50px; }
        .aspect-btn[data-ratio="21:9"] { min-width: 100px; }

        .aspect-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Блок чипсов (теги) */
        .tags-section {
            margin-bottom: 1.8rem;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }
        .tag-chip {
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .tag-chip.active {
            background: var(--chip-hover);
            border-color: var(--chip-hover);
            color: white;
        }
        .tag-chip:hover {
            background: var(--chip-hover);
            border-color: var(--chip-hover);
            color: white;
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .primary-btn, .lang-toggle-btn {
            background: linear-gradient(145deg, var(--accent), #3b4fd0);
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 1.8rem;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 15px 25px -10px var(--accent-glow);
            border: 1px solid rgba(255, 255, 255, 0.15);
            flex: 2;
        }

        .lang-toggle-btn {
            flex: 1;
            background: linear-gradient(145deg, #5f5f7a, #45455b);
            box-shadow: 0 10px 20px -8px #2d2d3a;
        }

        .primary-btn:hover, .lang-toggle-btn:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 20px 30px -8px var(--accent-glow);
            filter: brightness(1.1);
        }

        .primary-btn:active, .lang-toggle-btn:active {
            transform: scale(0.98) translateY(2px);
            box-shadow: 0 5px 15px -5px #1f29a0;
        }

        .result-area {
            background: var(--result-bg);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--input-border);
            transition: background 0.3s;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .result-actions {
            display: flex;
            gap: 0.6rem;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent);
            color: var(--text-primary);
            transform: scale(1.02);
        }

        .prompt-output {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 120px;
            padding: 0.5rem 0;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 1rem;
        }

        .examples {
            margin-top: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .examples span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .example-chip {
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .example-chip:hover {
            background: var(--chip-hover);
            border-color: var(--chip-hover);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 700px) {
            .main-panel { padding: 1.5rem; }
            h1 { font-size: 2rem; }
            .extra-settings { flex-direction: column; gap: 1rem; }
            .button-group { flex-direction: column; }
        }
    </style>

<body>

    <div class="shapes" id="parallaxShapes">
        <div class="shape shape1" data-depth="0.4"></div>
        <div class="shape shape2" data-depth="0.7"></div>
        <div class="shape shape3" data-depth="0.2"></div>
        <div class="shape shape4" data-depth="0.9"></div>
        <div class="shape shape5" data-depth="0.5"></div>
    </div>

    <div class="main-panel">
        <h1>✨ Промт-мастер</h1>
        <div class="subhead">Мощные, детальные промты с учётом всех параметров</div>

        <div class="input-group">
            <label for="rawPrompt">Твой промт (идея)</label>
            <textarea id="rawPrompt" placeholder="Например: сделай котика киберпанк">сделай котика киберпанк</textarea>
        </div>

        <div class="select-row">
            <div class="select-item">
                <label for="direction">Направление</label>
                <select id="direction">
                    <option value="image" selected>📷 Картинка / Фото</option>
                    <option value="text">📝 Текст</option>
                    <option value="code">💻 Код</option>
                    <option value="excel">📊 Excel</option>
                    <option value="video">🎬 Видео</option>
                    <option value="music">🎵 Музыка</option>
                    <option value="3d">🧊 3D модель</option>
                    <option value="design">🎨 Дизайн</option>
                    <option value="marketing">📈 Маркетинг</option>
                </select>
            </div>
            <div class="select-item">
                <label for="style">Стиль</label>
                <select id="style"></select>
            </div>
        </div>

        <!-- Дополнительные настройки (общие) -->
        <div class="extra-settings">
            <div class="setting-item">
                <label for="context">Контекст / доп. детали <span style="opacity:0.7;">(необязательно)</span></label>
                <textarea id="context" placeholder="Любые уточнения, которые нужно учесть..." rows="2"></textarea>
            </div>
            <div class="setting-item">
                <label for="detailLevel">Уровень детализации: <span id="detailValue" class="range-value">3</span></label>
                <input type="range" id="detailLevel" min="1" max="5" value="3" step="1">
            </div>
            <div class="setting-item" id="aspectRatioContainer" style="display: none;">
                <label>Соотношение сторон</label>
                <div class="aspect-ratio-group">
                    <div class="aspect-btn" data-ratio="16:9">16:9</div>
                    <div class="aspect-btn active" data-ratio="1:1">1:1</div>
                    <div class="aspect-btn" data-ratio="9:16">9:16</div>
                    <div class="aspect-btn" data-ratio="21:9">21:9</div>
                </div>
                <input type="hidden" id="aspectRatio" value="1:1">
            </div>
        </div>

        <!-- Блок тегов (специфических для направления) -->
        <div class="tags-section" id="tagsSection" style="display: none;">
            <label>Дополнительные опции (теги)</label>
            <div class="tags-container" id="tagsContainer"></div>
        </div>

        <div class="button-group">
            <button class="primary-btn" id="enhanceBtn">✨ Улучшить промт</button>
            <button class="lang-toggle-btn" id="langToggle">🇷🇺 Русский / 🇬🇧 English</button>
        </div>

        <div class="result-area">
            <div class="result-header">
                <span>улучшенный промт</span>
                <div class="result-actions">
                    <button class="copy-btn" id="copyBtn"><span>📋</span> Копировать</button>
                </div>
            </div>
            <div class="prompt-output" id="enhancedPrompt">Здесь появится улучшенная версия...</div>
        </div>

        <div class="examples">
            <span>Примеры:</span>
            <div class="example-chip" data-example="робот-пылесос пишет стихи">🤖 робот-пылесос пишет стихи</div>
            <div class="example-chip" data-example="интерфейс для приложения йоги">🧘 интерфейс для йоги</div>
            <div class="example-chip" data-example="формула для подсчёта часов">📅 формула для подсчёта часов</div>
            <div class="example-chip" data-example="логотип для кофейни в стиле минимализм">☕ логотип кофейни</div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 1. ДАННЫЕ ==========
            const styleMap = {
                image: ['реализм', 'киберпанк', 'фэнтези', 'импрессионизм', 'минимализм', 'сюрреализм', 'акварель'],
                text: ['официальный', 'человечный', 'креативный', 'юмористический', 'научный', 'поэтический', 'убедительный'],
                code: ['чистый', 'комментированный', 'оптимизированный', 'ООП', 'функциональный', 'безопасный', 'асинхронный'],
                excel: ['базовый', 'продвинутый', 'с макросами', 'визуализация', 'анализ данных', 'дашборд', 'финансовый'],
                video: ['кинематографичный', 'документальный', 'музыкальный клип', 'обучающий', 'рекламный', 'vlog', 'эпичный'],
                music: ['классический', 'электронный', 'рок', 'джаз', 'хип-хоп', 'lo-fi', 'эмбиент'],
                '3d': ['реалистичный', 'стилизованный', 'low poly', 'voxel', 'сюрреализм', 'киберпанк', 'мультяшный'],
                design: ['минимализм', 'необрутализм', 'киберпанк', 'скандинавский', 'поп-арт', 'ар-деко', 'футуризм'],
                marketing: ['убедительный', 'информационный', 'вирусный', 'сторителлинг', 'SEO-оптимизированный', 'лаконичный', 'эмоциональный']
            };

            const visualDirections = ['image', 'video', '3d', 'design']; // для соотношения сторон

            // Специфические теги для каждого направления
            const tagsMap = {
                code: ['Один HTML+CSS+JS файл', 'React + TypeScript', 'Node.js backend', 'Python script', 'SQL запрос', 'Документация'],
                excel: ['С графиками', 'Сводная таблица', 'Макрос VBA', 'Формулы массива', 'Дашборд', 'Условное форматирование'],
                marketing: ['Пост для Instagram', 'Email рассылка', 'Рекламный слоган', 'Статья для блога', 'PR-релиз', 'Тизер'],
                text: ['Статья', 'Пост', 'Письмо', 'Сценарий', 'Описание товара', 'Интервью'],
                music: ['Инструментал', 'Вокал', 'Эмбиент', 'Ремикс', 'Саундтрек', 'Бит'],
                video: ['Короткий метр', 'Полный метр', 'Ролик для TikTok', 'Обучающее видео', 'Обзор', 'Влог'],
                image: ['Портрет', 'Пейзаж', 'Арт', 'Фотография', 'Иллюстрация', 'Плакат'],
                '3d': ['Персонаж', 'Локация', 'Риггинг', 'Анимация', 'Визуализация', 'Скульптинг'],
                design: ['Логотип', 'Мокап', 'UI/UX', 'Баннер', 'Фирменный стиль', 'Презентация']
            };

            // ========== 2. ЭЛЕМЕНТЫ ==========
            const directionSelect = document.getElementById('direction');
            const styleSelect = document.getElementById('style');
            const rawPrompt = document.getElementById('rawPrompt');
            const contextField = document.getElementById('context');
            const detailSlider = document.getElementById('detailLevel');
            const detailSpan = document.getElementById('detailValue');
            const aspectContainer = document.getElementById('aspectRatioContainer');
            const aspectBtns = document.querySelectorAll('.aspect-btn');
            const aspectHidden = document.getElementById('aspectRatio');
            const enhancedDiv = document.getElementById('enhancedPrompt');
            const enhanceBtn = document.getElementById('enhanceBtn');
            const langToggle = document.getElementById('langToggle');
            const copyBtn = document.getElementById('copyBtn');
            const tagsSection = document.getElementById('tagsSection');
            const tagsContainer = document.getElementById('tagsContainer');

            let currentLang = 'ru'; 
            let activeTags = []; // массив выбранных тегов

            // ========== 3. ОБНОВЛЕНИЕ СТИЛЕЙ ==========
            function updateStyles() {
                const dir = directionSelect.value;
                const styles = styleMap[dir] || styleMap['image'];
                styleSelect.innerHTML = '';
                styles.forEach(s => {
                    const option = document.createElement('option');
                    option.value = s;
                    option.textContent = s.charAt(0).toUpperCase() + s.slice(1);
                    styleSelect.appendChild(option);
                });

                // Показываем/скрываем соотношение сторон
                if (visualDirections.includes(dir)) {
                    aspectContainer.style.display = 'block';
                } else {
                    aspectContainer.style.display = 'none';
                }

                // Обновляем теги
                updateTags(dir);
            }

            // ========== 4. ТЕГИ ==========
            function updateTags(direction) {
                const tags = tagsMap[direction] || [];
                if (tags.length > 0) {
                    tagsSection.style.display = 'block';
                    tagsContainer.innerHTML = '';
                    tags.forEach(tag => {
                        const chip = document.createElement('span');
                        chip.className = 'tag-chip';
                        chip.textContent = tag;
                        chip.dataset.tag = tag;
                        chip.addEventListener('click', () => {
                            chip.classList.toggle('active');
                            // Обновляем массив активных тегов
                            activeTags = Array.from(document.querySelectorAll('.tag-chip.active')).map(c => c.dataset.tag);
                        });
                        tagsContainer.appendChild(chip);
                    });
                } else {
                    tagsSection.style.display = 'none';
                    activeTags = [];
                }
            }

            directionSelect.addEventListener('change', updateStyles);

            // ========== 5. СЛАЙДЕР ДЕТАЛИЗАЦИИ ==========
            detailSlider.addEventListener('input', () => {
                detailSpan.textContent = detailSlider.value;
            });

            // ========== 6. КНОПКИ СООТНОШЕНИЯ СТОРОН ==========
            aspectBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    aspectBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    aspectHidden.value = btn.dataset.ratio;
                });
            });

            // ========== 7. ФУНКЦИЯ ГЕНЕРАЦИИ ПРОМТА ==========
            function generatePrompt(lang) {
                let idea = rawPrompt.value.trim();
                if (idea === '') idea = 'придумай что-то интересное';
                const direction = directionSelect.value;
                const style = styleSelect.value;
                const context = contextField.value.trim();
                const detailLevel = parseInt(detailSlider.value);
                const aspect = aspectHidden.value;
                const tags = activeTags; // массив строк

                // Инструкция по детализации
                let detailInstruction = '';
                if (lang === 'ru') {
                    if (detailLevel === 1) detailInstruction = 'Минимальная детализация, только основные элементы.';
                    else if (detailLevel === 2) detailInstruction = 'Средняя детализация, добавь несколько уточнений.';
                    else if (detailLevel === 3) detailInstruction = 'Детализация выше среднего, опиши ключевые аспекты подробно.';
                    else if (detailLevel === 4) detailInstruction = 'Высокая детализация, включи много конкретных деталей.';
                    else if (detailLevel === 5) detailInstruction = 'Максимальная детализация, опиши мельчайшие нюансы, текстуры, освещение, атмосферу.';
                } else {
                    if (detailLevel === 1) detailInstruction = 'Minimal detail, only main elements.';
                    else if (detailLevel === 2) detailInstruction = 'Medium detail, add a few clarifications.';
                    else if (detailLevel === 3) detailInstruction = 'Above average detail, describe key aspects thoroughly.';
                    else if (detailLevel === 4) detailInstruction = 'High detail, include many specific details.';
                    else if (detailLevel === 5) detailInstruction = 'Maximum detail, describe the smallest nuances, textures, lighting, atmosphere.';
                }

                let contextBlock = context ? (lang === 'ru' ? `Дополнительный контекст: ${context}. ` : `Additional context: ${context}. `) : '';
                let aspectBlock = (visualDirections.includes(direction) && aspect) ? (lang === 'ru' ? `Соотношение сторон: ${aspect}. ` : `Aspect ratio: ${aspect}. `) : '';
                let tagsBlock = tags.length > 0 ? (lang === 'ru' ? `Особые требования: ${tags.join(', ')}. ` : `Special requirements: ${tags.join(', ')}. `) : '';

                // ===== РАСШИРЕННЫЕ ШАБЛОНЫ =====
                let prompt = '';
                if (lang === 'ru') {
                    switch (direction) {
                        case 'image':
                            prompt = `Создай высококачественное изображение в стиле "${style}" на тему: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Учти композицию (правило третей, симметрия или динамика), цветовую палитру (гармоничная, контрастная или монохромная), освещение (естественное, студийное, неоновое), текстуры и детали. ` +
                                `Добавь глубину резкости, атмосферные эффекты (туман, дымка, блики). Изображение должно быть готово для профессионального использования. Формат: 8K, высокое разрешение.`;
                            break;
                        case 'text':
                            prompt = `Напиши текст в стиле "${style}" на тему: ${idea}. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Определи целевую аудиторию и цель. Используй подходящую лексику, риторические приёмы, структуру (введение, основная часть, заключение). ` +
                                `Объём: развёрнутый, без воды. Добавь примеры, метафоры, если уместно. Тон: ${style}. Учти возможные возражения читателя.`;
                            break;
                        case 'code':
                            prompt = `Напиши код для задачи: ${idea} в стиле "${style}". ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Требования: читаемость, модульность, обработка ошибок, комментарии. Добавь примеры использования, опиши входные и выходные данные. ` +
                                `Если применимо, используй современные практики. Код должен быть готов к интеграции.`;
                            break;
                        case 'excel':
                            prompt = `Создай формулу / макрос / таблицу Excel для задачи: ${idea}. Стиль: "${style}". ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Подробно опиши: какие ячейки задействованы, какие функции использованы, обработка ошибок. Добавь пример данных и результат. ` +
                                `Если нужен макрос VBA, приведи код с пояснениями. Оформи так, чтобы легко адаптировать.`;
                            break;
                        case 'video':
                            prompt = `Сгенерируй концепцию видео в стиле "${style}" на основе: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Опиши хронометраж, сюжет, ключевые сцены, раскадровку, визуальные эффекты, цветокоррекцию, музыку и звуки. ` +
                                `Укажи целевую аудиторию и платформу. Добавь рекомендации по монтажу.`;
                            break;
                        case 'music':
                            prompt = `Сочини музыкальный фрагмент в жанре "${style}", вдохновлённый: ${idea}. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Укажи темп (BPM), тональность, основные инструменты, настроение, структуру (вступление, куплет, припев, бридж, соло). ` +
                                `Опиши гармонии, ритмический рисунок, возможные эффекты. Предложи варианты аранжировки.`;
                            break;
                        case '3d':
                            prompt = `Создай 3D-модель в стиле "${style}" для сцены: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Опиши топологию, материалы, текстуры, освещение, камеру. Укажи, нужен ли риггинг/анимация. Формат экспорта. ` +
                                `Модель должна быть готова для рендера в движке.`;
                            break;
                        case 'design':
                            prompt = `Разработай дизайн-концепцию в стиле "${style}" для: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Включи цветовую палитру, типографику, компоновку, ключевые элементы. Добавь примеры использования на разных носителях. ` +
                                `Опиши пользовательский опыт.`;
                            break;
                        case 'marketing':
                            prompt = `Создай маркетинговый текст/кампанию в стиле "${style}" для продукта/услуги: ${idea}. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Определи целевую аудиторию, боли, УТП. Напиши заголовки, основной текст, призывы к действию. Предложи каналы распространения. ` +
                                `Тон: ${style}. Добавь варианты A/B тестирования.`;
                            break;
                        default:
                            prompt = `Улучшенный промт (${direction}, стиль: ${style}): ${idea}. ${contextBlock}${tagsBlock}${detailInstruction}`;
                    }
                } else { // английский
                    switch (direction) {
                        case 'image':
                            prompt = `Create a high-quality image in ${style} style based on: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Consider composition, color palette, lighting, textures, details. Add depth of field, atmospheric effects. Image ready for professional use. Format: 8K, high resolution.`;
                            break;
                        case 'text':
                            prompt = `Write a text in ${style} style on: ${idea}. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Define target audience and purpose. Use appropriate vocabulary, rhetorical devices, structure. Length: detailed but concise. Tone: ${style}.`;
                            break;
                        case 'code':
                            prompt = `Write code for task: ${idea} in ${style} style. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Requirements: readability, modularity, error handling, comments. Add usage examples, describe I/O. Use modern practices if applicable.`;
                            break;
                        case 'excel':
                            prompt = `Create an Excel formula/macro for: ${idea}. Style: ${style}. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Describe cells, functions, error handling. Add sample data and result. If VBA, provide code. Make it adaptable.`;
                            break;
                        case 'video':
                            prompt = `Generate a video concept in ${style} style based on: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Describe runtime, storyline, key scenes, storyboard, VFX, color grading, soundtrack. Target audience and platform.`;
                            break;
                        case 'music':
                            prompt = `Compose a music piece in ${style} genre inspired by: ${idea}. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Specify BPM, key, main instruments, mood, structure. Describe harmonies, rhythm, effects. Suggest arrangement.`;
                            break;
                        case '3d':
                            prompt = `Create a 3D model in ${style} style for: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Describe topology, materials, textures, lighting, camera. Specify rigging/animation. Export format. Ready for rendering.`;
                            break;
                        case 'design':
                            prompt = `Develop a design concept in ${style} style for: ${idea}. ${aspectBlock}${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Include color palette, typography, layout, key elements. Usage examples. Describe UX.`;
                            break;
                        case 'marketing':
                            prompt = `Create marketing text/campaign in ${style} style for: ${idea}. ${contextBlock}${tagsBlock}${detailInstruction} ` +
                                `Identify audience, pains, USP. Write headlines, body, CTAs. Suggest channels. Tone: ${style}. A/B testing options.`;
                            break;
                        default:
                            prompt = `Enhanced prompt (${direction}, style: ${style}): ${idea}. ${contextBlock}${tagsBlock}${detailInstruction}`;
                    }
                }
                return prompt;
            }

            function updatePrompt() {
                enhancedDiv.textContent = generatePrompt(currentLang);
            }

            // ========== 8. ОБРАБОТЧИКИ ==========
            enhanceBtn.addEventListener('click', () => {
                const dir = directionSelect.value;
                const autoLang = visualDirections.includes(dir) ? 'en' : 'ru';
                currentLang = autoLang;
                langToggle.textContent = currentLang === 'ru' ? '🇷🇺 Русский / 🇬🇧 English' : '🇬🇧 English / 🇷🇺 Русский';
                updatePrompt();
            });

            langToggle.addEventListener('click', () => {
                currentLang = currentLang === 'ru' ? 'en' : 'ru';
                langToggle.textContent = currentLang === 'ru' ? '🇷🇺 Русский / 🇬🇧 English' : '🇬🇧 English / 🇷🇺 Русский';
                updatePrompt();
            });

            copyBtn.addEventListener('click', () => {
                const text = enhancedDiv.textContent;
                if (text && text !== 'Здесь появится улучшенная версия...') {
                    navigator.clipboard.writeText(text).then(() => {
                        const original = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<span>✅</span> Скопировано!';
                        setTimeout(() => {
                            copyBtn.innerHTML = original;
                        }, 1500);
                    }).catch(() => alert('Не удалось скопировать, выделите текст вручную.'));
                } else {
                    alert('Сначала сгенерируйте промт!');
                }
            });

            // Чипсы примеров
            document.querySelectorAll('.example-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    rawPrompt.value = chip.getAttribute('data-example');
                    const dir = directionSelect.value;
                    currentLang = visualDirections.includes(dir) ? 'en' : 'ru';
                    langToggle.textContent = currentLang === 'ru' ? '🇷🇺 Русский / 🇬🇧 English' : '🇬🇧 English / 🇷🇺 Русский';
                    updatePrompt();
                });
            });

            // Инициализация
            window.addEventListener('load', () => {
                updateStyles(); // заполнит стили и теги
                const dir = directionSelect.value;
                currentLang = visualDirections.includes(dir) ? 'en' : 'ru';
                langToggle.textContent = currentLang === 'ru' ? '🇷🇺 Русский / 🇬🇧 English' : '🇬🇧 English / 🇷🇺 Русский';
                updatePrompt();
            });

            // ========== 9. ПАРАЛЛАКС ==========
            const shapes = document.querySelectorAll('.shape');
            let mouseX = 0, mouseY = 0;
            let targetX = 0, targetY = 0;
            const ease = 0.08;

            document.addEventListener('mousemove', (e) => {
                targetX = (e.clientX / window.innerWidth - 0.5) * 2;
                targetY = (e.clientY / window.innerHeight - 0.5) * 2;
            });

            function animateShapes() {
                mouseX += (targetX - mouseX) * ease;
                mouseY += (targetY - mouseY) * ease;
                shapes.forEach(shape => {
                    const depth = parseFloat(shape.getAttribute('data-depth') || 0.5);
                    const moveX = mouseX * 60 * depth;
                    const moveY = mouseY * 60 * depth;
                    const rotateY = mouseX * 20 * depth;
                    const rotateX = mouseY * 20 * depth;
                    const scale = 1 + Math.abs(mouseX * mouseY) * 0.15 * depth;
                    shape.style.transform = `translate(${moveX}px, ${moveY}px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;
                });
                requestAnimationFrame(animateShapes);
            }
            animateShapes();

            document.addEventListener('mouseleave', () => {
                targetX = 0; targetY = 0;
            });
        })();
    </script>

</body>
</html>
