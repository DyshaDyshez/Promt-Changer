<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Pro — Money Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 600px; text-align: center; background: #181818; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); border: 1px solid #333; }
        h1 { color: #00d2ff; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #00d2ff; }
        button { background: linear-gradient(45deg, #007bff, #00d2ff); color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,210,255,0.4); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; box-shadow: none; }
        #result { margin-top: 30px; padding: 20px; background: #252525; border-radius: 12px; display: none; text-align: left; border: 1px dashed #555; }
        #promptText { color: #00ffcc; font-family: 'Courier New', monospace; white-space: pre-wrap; word-wrap: break-word; }
        .copy-btn { margin-top: 15px; display: inline-block; background: #333; color: #00d2ff; padding: 8px 15px; border-radius: 6px; cursor: pointer; border: 1px solid #00d2ff; font-size: 13px; }
        .copy-btn:hover { background: #00d2ff; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Prompt Money-Maker</h1>
        <div class="subtitle">Работает на DeepSeek V3 (через OpenRouter)</div>
        
        <textarea id="userInput" placeholder="Напиши что угодно: ковбой на динозавре, киберпанк бабушка..."></textarea>
        <button id="mainBtn" onclick="optimizePrompt()">Улучшить и заработать</button>
        
        <div id="result">
            <strong>💎 Готовый промпт для Midjourney:</strong>
            <p id="promptText"></p>
            <div class="copy-btn" onclick="copyText()">Копировать результат</div>
        </div>
    </div>

    <script>
       async function optimizePrompt() {
    const input = document.getElementById('userInput').value;
    const resultDiv = document.getElementById('result');
    const promptText = document.getElementById('promptText');
    const btn = document.getElementById('mainBtn');

    if (!input.trim()) return alert("Введи запрос!");

    // ТВОЙ НОВЫЙ ТОКЕН ОТ HUGGING FACE
    const HF_TOKEN = "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";
    
    // Используем модель Mistral (она стабильная и бесплатная)
    const MODEL_ID = "mistralai/Mistral-7B-Instruct-v0.2";

    btn.innerText = "Hugging Face думает...";
    btn.disabled = true;

    try {
        const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL_ID}`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${HF_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                inputs: `<s>[INST] You are a professional prompt engineer. Expand this idea into a detailed English Midjourney prompt: "${input}". Output ONLY the final prompt text without any intro. [/INST]`,
                parameters: { max_new_tokens: 250 }
            })
        });

        const data = await response.json();

        // У Hugging Face ответ приходит либо массивом, либо объектом с ошибкой
        if (data[0] && data[0].generated_text) {
            let result = data[0].generated_text;
            // Убираем из ответа саму инструкцию, если она там осталась
            result = result.split('[/INST]').pop().trim();
            
            promptText.innerText = result;
            resultDiv.style.display = 'block';
        } else if (data.error) {
            if (data.error.includes("loading")) {
                alert("Модель просыпается... Подожди 10 секунд и нажми еще раз (она загружается на сервер).");
            } else {
                alert("Ошибка: " + data.error);
            }
        }
    } catch (error) {
        alert("Ошибка сети. Проверь VPN, если ты в РФ!");
    } finally {
        btn.innerText = "Улучшить и заработать";
        btn.disabled = false;
    }
}
    </script>
</body>
</html>
