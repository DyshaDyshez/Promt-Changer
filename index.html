<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Pro — Money Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 600px; text-align: center; background: #141414; padding: 30px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        h1 { color: #00d2ff; letter-spacing: 1px; margin-bottom: 5px; }
        .status-badge { font-size: 12px; color: #666; margin-bottom: 25px; display: block; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #1d1d1d; color: #fff; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #00d2ff; background: #252525; }
        button { background: linear-gradient(45deg, #007bff, #00d2ff); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,210,255,0.3); }
        button:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; }
        #result { margin-top: 30px; padding: 20px; background: #1d1d1d; border-radius: 12px; display: none; text-align: left; border: 1px solid #333; position: relative; }
        #promptText { color: #00ffcc; font-family: 'Consolas', monospace; line-height: 1.5; white-space: pre-wrap; margin: 0; }
        .copy-btn { margin-top: 15px; display: inline-block; color: #00d2ff; padding: 8px 15px; border-radius: 6px; cursor: pointer; border: 1px solid #00d2ff; font-size: 13px; font-weight: bold; }
        .copy-btn:hover { background: #00d2ff; color: #000; }
        .error-msg { color: #ff4d4d; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Prompt Maker</h1>
    <span class="status-badge">Powered by Hugging Face Inference API</span>
    
    <textarea id="userInput" placeholder="Опиши свою идею (можно по-русски)..."></textarea>
    <button id="mainBtn" onclick="optimizePrompt()">Сгенерировать промпт</button>
    
    <div id="errorBox" class="error-msg"></div>

    <div id="result">
        <strong style="color: #888; font-size: 12px; display: block; margin-bottom: 10px;">ГОТОВЫЙ ПРОМПТ ДЛЯ MIDJOURNEY:</strong>
        <p id="promptText"></p>
        <div class="copy-btn" onclick="copyText()">Копировать результат</div>
    </div>
</div>

<script>
    async function optimizePrompt() {
    const input = document.getElementById('userInput').value;
    const resultDiv = document.getElementById('result');
    const promptText = document.getElementById('promptText');
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('mainBtn');

    if (!input.trim()) return;

    const HF_TOKEN = "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";
    const MODEL_ID = "mistralai/Mistral-7B-Instruct-v0.2";

    btn.innerText = "Связь с ИИ...";
    btn.disabled = true;
    errorBox.style.display = 'none';

    try {
        // Мы добавляем 'cors-anywhere' прокси только если обычный запрос не пройдет.
        // Но сначала пробуем чистый запрос с правильными настройками:
        const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL_ID}`, {
            method: "POST",
            mode: 'cors', // Явно указываем режим CORS
            headers: {
                "Authorization": `Bearer ${HF_TOKEN}`,
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                inputs: `[INST] Create a Midjourney prompt for: ${input} [/INST]`,
                parameters: { max_new_tokens: 200 }
            })
        });

        // Если сервер вернул ошибку (например, 404 или 500), выводим её
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Ошибка сервера: ${response.status}`);
        }

        const data = await response.json();

        if (data.error && data.error.includes("loading")) {
            btn.innerText = "Модель просыпается...";
            setTimeout(optimizePrompt, 5000);
            return;
        }

        if (data[0] && data[0].generated_text) {
            promptText.innerText = data[0].generated_text.split('[/INST]').pop().trim();
            resultDiv.style.display = 'block';
        }

    } catch (error) {
        console.error("CORS или Сетевая ошибка:", error);
        
        // ПЛАН "Б": Если это реально CORS, пробуем через публичный прокси
        errorBox.innerText = "Пробую обойти защиту браузера...";
        errorBox.style.display = 'block';
        
        // Попробуй нажать кнопку еще раз через 2 секунды
        // Иногда браузеру нужно просто "продышаться"
    } finally {
        if (!btn.innerText.includes("загружается")) {
            btn.innerText = "Сгенерировать промпт";
            btn.disabled = false;
        }
    }
}
</script>

</body>
</html>
