<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sales Assistant | Secure Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <h1 class="text-2xl font-bold text-emerald-400">Secure AI Assistant</h1>
        </div>
        <p class="text-slate-400 text-sm mb-6">Безопасная работа через Supabase Edge Functions</p>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Возражение родителя</label>
                <textarea id="objectionInput" rows="3" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                    placeholder="Например: 'У нас нет времени на дополнительные занятия...'"></textarea>
            </div>

            <button onclick="getAdvice()" id="submitBtn"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                <span id="btnText">Получить совет ИИ</span>
            </button>

            <div id="resultBox" class="hidden mt-6 space-y-3">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Рекомендация по продажам</label>
                <div id="aiResponse" class="bg-slate-900 border border-emerald-900/30 rounded-lg p-4 text-sm leading-relaxed text-slate-300 italic whitespace-pre-wrap">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ЗАМЕНИ НА СВОЙ URL ИЗ SUPABASE
        const FUNCTION_URL = 'https://ligmsihssbvolgdogaqm.supabase.co/functions/v1/sales-ai';

        async function getAdvice() {
            const input = document.getElementById('objectionInput').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const resultBox = document.getElementById('resultBox');
            const responseDiv = document.getElementById('aiResponse');

            if (!input) return alert('Введите текст возражения');

            // Состояние загрузки
            btn.disabled = true;
            btnText.innerText = 'Запрос к серверу...';
            resultBox.classList.add('hidden');

            try {
                const response = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ objection: input })
                });

                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }

                const data = await response.json();
                
                // Проверяем структуру ответа от OpenRouter через твою функцию
                if (data.choices && data.choices[0].message) {
                    responseDiv.innerText = data.choices[0].message.content;
                    resultBox.classList.remove('hidden');
                } else {
                    throw new Error('Некорректный формат ответа от ИИ');
                }

            } catch (error) {
                console.error("Ошибка:", error);
                alert('Произошла ошибка. Проверь логи Edge Function в Supabase или VPN.');
            } finally {
                btn.disabled = false;
                btnText.innerText = 'Получить совет ИИ';
            }
        }
    </script>
</body>
</html>
